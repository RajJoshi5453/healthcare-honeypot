# Cowrie Honeypot Configuration
# Purpose: Simulate a vulnerable medical IoT device (HVAC controller) to trap attackers.
# Device persona: MedDevice-HVAC-01 running BusyBox v1.29.3 inside a hospital network.

[honeypot]
# Hostname shown to attackers when they SSH in. Mimics a medical device naming convention.
hostname = MedDevice-HVAC-01

# Listen address and ports. Bind to all interfaces inside the container.
# Host port 2222 is mapped to this in docker-compose.yml so attackers hit 2222.
listen_endpoints = tcp:2222:interface=0.0.0.0
telnet_listen_endpoints = tcp:2223:interface=0.0.0.0

# Log output directory inside the container. Must match the Docker volume mount
# so Logstash can read JSON logs from the shared volume.
log_path = var/log/cowrie

# Interactive shell timeout in seconds. Keep attackers engaged but don't hang forever.
interactive_timeout = 300
authentication_timeout = 120

# Fake filesystem to make the device look like a real medical IoT endpoint.
# fs.pickle defines the directory tree including /opt/medical/ and /etc/dicom/.
filesystem = share/cowrie/fs.pickle

# TTY settings to look like a real embedded device.
ttylog = true

[output_json]
# Enable JSON logging so parser.py can read structured events easily.
# This is the primary format for the log-parser pipeline.
logfile = ${honeypot:log_path}/cowrie.json
enabled = true

[output_text]
# Human-readable text log for quick debugging. Keep disabled in production to save disk.
logfile = ${honeypot:log_path}/cowrie.log
enabled = false

[shell]
# Fake OS emulation. BusyBox is extremely common on medical IoT and embedded devices.
# This banner and behavior convince attacker tools they found a real target.
fake_os = BusyBox v1.29.3
# Architecture string shown in uname and /proc files.
fake_arch = armv7l
# Kernel version string mimicking a long-unpatched embedded system.
fake_version = Linux 4.14.98-v7+

# Environment variables exposed to attackers. Include fake medical device paths.
# These will show up in 'env' output and tempt attackers to explore deeper.
environment = PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/medical/bin:/etc/dicom/scripts

# Fake user and group IDs. Look like a low-privilege embedded service account.
fake_uid = 1001
fake_gid = 1001
fake_username = hvac-service

# Make the prompt look realistic for an embedded device.
# Short and utilitarian, no fancy colors or shell customizations.
# Prompt format: user@hostname:current_directory$
# Cowrie uses its own prompt formatting, but we set shell defaults via env.

# Enable SFTP so attackers can upload malware samples we can later analyze.
# Files land in a sandboxed directory inside the container, not on the host directly.
enabled = true

# Telnet emulation settings. Many IoT devices still expose Telnet for "remote maintenance".
[telnet]
enabled = true

# Authentication backend. userdb.txt defines credentials we accept.
# We intentionally accept weak default IoT passwords to let attackers in.
auth_class = UserDB

# Guest user account. Appears as a realistic low-privilege account on a medical device.
# If the attacker guesses a wrong password, we can still let them in as a 'guest'
# to study their behavior. Disabled here to keep the simulation strict.
guest_enabled = false

# SSH settings
[ssh]
# SSH version string sent to clients. Matches an old embedded OpenSSH build.
version = SSH-2.0-OpenSSH_7.9
# Use a small RSA key to look like an embedded device that never rotated keys.
rsa_public_key = etc/ssh_host_rsa_key.pub
rsa_private_key = etc/ssh_host_rsa_key

# Database settings for internal Cowrie state. Using SQLite inside the container.
[database_sqlite]
enabled = true
# Path inside container.
database = var/lib/cowrie/cowrie.db

# Downloaded files (malware samples) captured via SFTP/SCP/Wget.
# These are stored in the container and should be periodically copied to analysis/malware_samples/
# on the host for offline reverse engineering. IMPORTANT: gitignored for safety.
[download]
# Directory inside the container where uploaded/downloaded files are saved.
outdir = var/lib/cowrie/downloads

hostname = MedDevice-HVAC-01
fake_addr = 192.168.10.50
ssh_banner = SSH-2.0-OpenSSH_7.4 MedOS-3.2.1
