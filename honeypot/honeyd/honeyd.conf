# Healthcare IoT Honeypot - Simulated Services
# Port 104  - DICOM (Digital Imaging and Communications in Medicine)
# Port 2575 - HL7 (Health Level 7 messaging)
# Port 8080 - Fake medical device web interface
# Port 22   - SSH (Cowrie handles this)

# Honeyd Configuration
# Purpose: Simulate low-interaction medical protocol services on common DICOM/HL7 ports.
# Honeyd is a lightweight honeypot daemon that can emulate OS fingerprints and
# respond to port scans with fake service banners. This config is designed to
# catch attackers specifically targeting healthcare infrastructure (PACS, HL7 routers).

# Create a virtual host persona that mimics a Windows-based medical imaging workstation.
# Windows is common for DICOM viewers and HL7 interface engines in legacy hospitals.
create windows-medical
set windows-medical personality "Microsoft Windows 10 Professional"
set windows-medical default tcp action reset
set windows-medical default udp action reset
set windows-medical uptime 43200

# --- DICOM Simulation (Port 104) ---
# DICOM (Digital Imaging and Communications in Medicine) is the standard for
# medical imaging transmission (X-rays, MRIs, CT scans). Port 104 is the
# well-known DICOM port. Attackers scanning for open 104 may attempt C-ECHO
# or C-FIND operations to exfiltrate imaging data.
add windows-medical tcp port 104 "DICOM Echo Server\r\n"

# --- HL7 Simulation (Port 2575) ---
# HL7 (Health Level 7) is the messaging standard for hospital information systems.
# Port 2575 is commonly used for HL7 v2.x MLLP (Minimal Lower Layer Protocol).
# Attackers targeting this port may attempt to inject fraudulent patient records.
add windows-medical tcp port 2575 "HL7 Message Server Ready\r\n"

# --- Fake HTTP Management Portal (Port 8080) ---
# Many medical IoT devices expose a web-based admin panel on non-standard ports.
# A simple banner can lure attackers into running curl or Nikto scans.
add windows-medical tcp port 8080 "HTTP/1.1 200 OK\r\nServer: MedDevice-WebSrv/1.2\r\nContent-Type: text/html\r\n\r\n<html><body>MedDevice HVAC Controller v2.1</body></html>\r\n"

# Bind the virtual host to a specific IP range in the honeypot network.
# In production, this would be allocated on the isolated VLAN.
bind 172.25.0.50 windows-medical

# --- Optional: Linux-based embedded device persona (infusion pump) ---
# BusyBox-based Linux is common on embedded medical devices.
create linux-embedded
set linux-embedded personality "Linux 2.6.x"
set linux-embedded default tcp action reset
set linux-embedded default udp action reset

# Telnet trap (classic IoT worm vector)
add linux-embedded tcp port 23 "login: "

# SSH banner (Honeyd does not do full SSH handshake; Cowrie handles real SSH)
# This is just to make port scans show port 22 as "open" with a banner.
add linux-embedded tcp port 22 "SSH-2.0-OpenSSH_7.9\r\n"

bind 172.25.0.51 linux-embedded
