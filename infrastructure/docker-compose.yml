# IoT Deception Honeypot Network - Docker Compose
# Purpose: Runs Cowrie SSH honeypot + ELK stack on an isolated Docker network.
# Constraint: No host network exposure. Only explicitly mapped ports are accessible.
# This ensures the honeypot cannot accidentally touch real hospital infrastructure.

version: "3.8"

services:
  # Cowrie SSH/Telnet Honeypot
  # Simulates a vulnerable medical IoT device to capture attacker behavior.
  cowrie:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.cowrie
    container_name: cowrie-honeypot
    restart: unless-stopped
    ports:
      # Map host port 2222 to Cowrie's internal SSH port 2222
      - "2222:2222"
      # Map host port 2223 to Cowrie's internal Telnet port 2223
      - "2223:2223"
    volumes:
      # Mount live logs so Logstash on the host can read them
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      # Mount custom fake filesystem and config
      - ../honeypot/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ../honeypot/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - ../honeypot/cowrie/fs.pickle:/cowrie/cowrie-git/share/cowrie/fs.pickle:ro
    env_file:
      - ../.env
    networks:
      - honeypot-isolated

  # Elasticsearch - stores parsed IoCs and attack events
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - honeypot-isolated

  # Logstash - ingests Cowrie JSON logs into Elasticsearch
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    restart: unless-stopped
    volumes:
      - cowrie-logs:/var/log/cowrie:ro
      - ../siem/logstash/cowrie-pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    depends_on:
      - elasticsearch
    networks:
      - honeypot-isolated

  # Kibana - visualize attack patterns and command frequency
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - honeypot-isolated

  # Flask Dashboard - custom UI for attack summary and world map
  # Build context is repo root so the Dockerfile can copy dashboard/ files.
  dashboard:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.dashboard
    container_name: flask-dashboard
    restart: unless-stopped
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - ../.env
    environment:
      - ATTACK_PATTERNS_PATH=/app/analysis/attack_patterns.json
    volumes:
      - ../analysis:/app/analysis:ro
    networks:
      - honeypot-isolated

volumes:
  # Shared volume so Logstash can read Cowrie logs without direct container coupling
  cowrie-logs:
  es-data:

networks:
  # Isolated bridge network. Containers can talk to each other,
  # but the host's LAN and hospital network are unreachable unless explicitly mapped.
  honeypot-isolated:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
