# Logstash Pipeline: Cowrie JSON -> Elasticsearch
# Purpose: Reads Cowrie JSON logs line-by-line, parses each event,
# applies minor field enrichment (timestamp normalization, geoip hint),
# and ships documents to Elasticsearch index "cowrie-iocs".
#
# This pipeline is mounted into the Logstash container via docker-compose.yml
# at /usr/share/logstash/pipeline/logstash.conf.

input {
  # Tail the Cowrie JSON log file from the shared Docker volume.
  file {
    path => "/var/log/cowrie/cowrie.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    # Tag entries so we know the source in Elasticsearch.
    type => "cowrie"
    tags => ["honeypot", "cowrie", "healthcare-iot"]
  }
}

filter {
  # Normalize timestamp to @timestamp so Kibana time pickers work automatically.
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # If the event is a file upload, copy the shasum into a top-level field
  # so Kibana dashboards can quickly search by malware hash.
  if [eventid] == "cowrie.session.file_upload" {
    mutate {
      add_field => { "file_sha256" => "%{shasum}" }
    }
  }

  # If the event is a login attempt, add a boolean flag for quick filtering.
  if [eventid] in ["cowrie.login.success", "cowrie.login.failed"] {
    mutate {
      add_field => {
        "is_login_event" => true
        "login_success" => "%{[eventid] == 'cowrie.login.success' ? 'true' : 'false'}"
      }
    }
  }

  # If the event is a command input, lowercase the command for easier aggregation
  # (attackers vary casing: WGET, wget, Wget). Keep original in [input].
  if [eventid] == "cowrie.command.input" {
    mutate {
      copy => { "input" => "command_original" }
    }
    mutate {
      lowercase => [ "input" ]
      add_field => { "command_normalized" => "%{input}" }
    }
  }

  # Remove Logstash internal fields that clutter the index.
  mutate {
    remove_field => [ "host", "log", "agent", "ecs", "input" ]
  }
}

output {
  # Ship everything to Elasticsearch. The index name rotates daily for easier management.
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cowrie-iocs-%{+YYYY.MM.dd}"
    # Document ID uses the Cowrie session + event timestamp to prevent duplicates
    # if Logstash restarts and re-reads the same lines.
    document_id => "%{session}@%{timestamp}"
  }

  # Also print to stdout so docker logs show pipeline activity during debugging.
  stdout {
    codec => rubydebug { metadata => false }
  }
}
